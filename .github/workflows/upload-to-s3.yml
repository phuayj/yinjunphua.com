name: Upload to S3

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ap-northeast-1
  S3_BUCKET: yinjunphua.com
  CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID || secrets.CLOUDFRONT_DISTRIBUTION_ID }}

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Add analytics tracking
        run: node scripts/inject-tracking.js

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: arn:aws:iam::180964446480:role/github-yinjunphuacom-s3-upload

      - name: Sync site to S3
        run: |
          # Non-fingerprinted assets (images, files, favicons, etc.):
          # short-lived so in-place edits propagate within a day.
          aws s3 sync _site "s3://${S3_BUCKET}" \
            --delete \
            --exclude '.DS_Store' \
            --exclude '*/.DS_Store' \
            --exclude '*.html' \
            --exclude '*.pdf' \
            --exclude '*.css' \
            --cache-control "public,max-age=86400,must-revalidate"
          # CSS is cache-busted via ?v=<hash> query strings, so it can stay immutable.
          aws s3 sync _site "s3://${S3_BUCKET}" \
            --delete \
            --exclude '.DS_Store' \
            --exclude '*/.DS_Store' \
            --exclude '*' \
            --include '*.css' \
            --cache-control "public,max-age=31536000,immutable"
          aws s3 sync _site "s3://${S3_BUCKET}" \
            --delete \
            --exclude '.DS_Store' \
            --exclude '*/.DS_Store' \
            --exclude '*' \
            --include '*.pdf' \
            --cache-control "public,max-age=86400,must-revalidate"
          aws s3 sync _site "s3://${S3_BUCKET}" \
            --delete \
            --exclude '.DS_Store' \
            --exclude '*/.DS_Store' \
            --exclude '*' \
            --include '*.html' \
            --cache-control "public,max-age=300,must-revalidate"

      - name: Invalidate CloudFront
        run: |
          if [ -z "${CLOUDFRONT_DISTRIBUTION_ID}" ]; then
            echo "CLOUDFRONT_DISTRIBUTION_ID not set; skipping invalidation"
            exit 0
          fi
          aws cloudfront create-invalidation --distribution-id "${CLOUDFRONT_DISTRIBUTION_ID}" --paths "/*"
